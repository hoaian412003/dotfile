
# Split window horizontally with Command + \
bind-key -n 'M-\' split-window -h -c "#{pane_current_path}"
# New tab (window) with Ctrol + t

bind-key -n 'C-t' new-window -c "#{pane_current_path}"

# Next tab (window) with Ctrl + n
bind-key -n 'C-n' next-window

# Previous tab (window) with Ctrl + b
bind-key -n 'C-b' previous-window

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ── Status line ──────────────────────────────────────────────────────────────

# Enable status bar
set -g status on
set -g status-interval 5
set -g status-position bottom

# Colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] 󰊓 #S #[bg=#1e1e2e,fg=#89b4fa]"

# Right: directory, shell, date & time
set -g status-right-length 120
set -g status-right "#[fg=#cba6f7] #{b:pane_current_path}#[fg=#6c7086] │ #[fg=#f38ba8]#{pane_current_command}#[fg=#6c7086] │ #[fg=#a6e3a1] %d %b#[fg=#6c7086] │ #[fg=#89dceb] %H:%M:%S "

# Window tabs
set -g window-status-format "#[fg=#6c7086] #I: #W "
set -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I: #W #[bg=#1e1e2e,fg=#313244]"

# Window status separator
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Vim no delay
set -sg escape-time 0

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
